<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>股票交易日誌</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 解決 iOS 鍵盤喚起的核心 CSS */
        input, select {
            -webkit-user-select: text !important;
            user-select: text !important;
            font-size: 16px !important; /* iOS 規定 16px 以上才不會自動縮放，減少 Bug */
        }
        body { 
            cursor: pointer; /* 讓 iOS 認為整個畫面都是可點擊的 */
        }
    </style>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">📈 交易日誌</h1>
        
        <div class="bg-blue-600 text-white p-6 rounded-2xl mb-6 shadow-lg">
            <p class="text-xs opacity-75">帳戶總餘額</p>
            <h2 id="totalBalance" class="text-3xl font-bold">$ 0</h2>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="date" class="ios-input w-full p-3 bg-gray-100 rounded-lg">
                <select id="type" class="ios-input w-full p-3 bg-gray-100 rounded-lg" onchange="toggleFields()">
                    <option value="buy">買入股票</option>
                    <option value="sell">賣出股票</option>
                    <option value="in">存入現金</option>
                    <option value="out">提出現金</option>
                </select>
            </div>

            <input type="text" id="symbol" placeholder="標的名稱" onclick="this.focus();"
                   class="ios-input w-full p-3 bg-gray-100 rounded-lg">
            
            <div id="stockFields" class="grid grid-cols-2 gap-2">
                <input type="number" id="price" placeholder="單價" onclick="this.focus();"
                       class="ios-input w-full p-3 bg-gray-100 rounded-lg">
                <input type="number" id="qty" placeholder="股數" onclick="this.focus();"
                       class="ios-input w-full p-3 bg-gray-100 rounded-lg">
            </div>

            <input type="number" id="amount" placeholder="金額" onclick="this.focus();"
                   class="ios-input w-full p-3 bg-gray-100 rounded-lg hidden">

            <button onclick="addRecord()" class="w-full bg-blue-500 text-white py-4 rounded-xl font-bold">儲存</button>
        </div>

        <div id="recordList" class="mt-6 space-y-3"></div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();
        let records = JSON.parse(localStorage.getItem('trading_v4') || '[]');

        // 核心修正：強制 iOS 點擊輸入框時聚焦
        const inputs = document.querySelectorAll('.ios-input');
        inputs.forEach(input => {
            input.addEventListener('touchstart', function() {
                this.focus();
            });
        });

        function toggleFields() {
            const type = document.getElementById('type').value;
            const isStock = type === 'buy' || type === 'sell';
            document.getElementById('stockFields').style.display = isStock ? 'grid' : 'none';
            document.getElementById('amount').style.display = isStock ? 'none' : 'block';
        }

        function updateUI() {
            const list = document.getElementById('recordList');
            let balance = 0;
            list.innerHTML = '';
            
            // 排序並計算
            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            records.forEach(r => balance += r.change);
            
            [...records].reverse().forEach((r, i) => {
                const item = document.createElement('div');
                item.className = `bg-white p-4 rounded-xl shadow-sm border-l-4 ${r.change >= 0 ? 'border-green-500' : 'border-red-500'} flex justify-between`;
                item.innerHTML = `
                    <div>
                        <div class="text-xs text-gray-400">${r.date}</div>
                        <div class="font-bold">${r.symbol || '現金'}</div>
                        <div class="text-sm ${r.change >= 0 ? 'text-green-600' : 'text-red-600'}">${r.change.toLocaleString()}</div>
                    </div>
                    <button onclick="deleteRecord(${records.length - 1 - i})" class="text-gray-300">🗑️</button>
                `;
                list.appendChild(item);
            });
            document.getElementById('totalBalance').innerText = '$ ' + balance.toLocaleString();
            localStorage.setItem('trading_v4', JSON.stringify(records));
        }

        function addRecord() {
            const type = document.getElementById('type').value;
            const symbol = document.getElementById('symbol').value;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const qty = parseInt(document.getElementById('qty').value) || 0;
            let amount = parseFloat(document.getElementById('amount').value) || 0;
            let change = (type === 'buy' || type === 'sell') ? (type === 'buy' ? -price * qty : price * qty) : (type === 'in' ? amount : -amount);

            records.push({ date: document.getElementById('date').value, type, symbol, change });
            updateUI();
            ['symbol', 'price', 'qty', 'amount'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteRecord(index) {
            if(confirm('刪除？')) { records.splice(index, 1); updateUI(); }
        }

        updateUI();
    </script>
</body>
</html>
