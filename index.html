<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易日誌</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">📈 交易日誌</h1>
        
        <div class="bg-blue-600 text-white p-6 rounded-xl mb-6 shadow-lg">
            <p class="text-sm opacity-80">帳戶總餘額</p>
            <h2 id="totalBalance" class="text-3xl font-bold">$ 0</h2>
        </div>

        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <select id="type" class="w-full mb-2 p-2 border rounded">
                <option value="buy">買入股票</option>
                <option value="sell">賣出股票</option>
                <option value="in">存入現金</option>
                <option value="out">提出現金</option>
            </select>
            <input type="text" id="symbol" placeholder="標的/備註" class="w-full mb-2 p-2 border rounded">
            <input type="number" id="price" placeholder="單價 (選填)" class="w-full mb-2 p-2 border rounded">
            <input type="number" id="qty" placeholder="數量 (選填)" class="w-full mb-2 p-2 border rounded">
            <input type="number" id="amount" placeholder="手動變動金額 (選填)" class="w-full mb-2 p-2 border rounded">
            <button onclick="addRecord()" class="w-full bg-blue-500 text-white p-2 rounded font-bold">儲存紀錄</button>
        </div>

        <div id="recordList" class="space-y-3"></div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('stock_records') || '[]');

        function updateUI() {
            const list = document.getElementById('recordList');
            const totalDisplay = document.getElementById('totalBalance');
            list.innerHTML = '';
            let balance = 0;

            records.forEach((r, index) => {
                balance += r.change;
                const item = document.createElement('div');
                item.className = "bg-white p-3 rounded shadow-sm border-l-4 " + (r.change >= 0 ? 'border-green-500' : 'border-red-500');
                item.innerHTML = `
                    <div class="flex justify-between">
                        <span class="font-bold">${r.symbol} (${r.type})</span>
                        <span class="text-gray-500 text-sm">${r.date}</span>
                    </div>
                    <div class="text-sm text-gray-600">變動: ${r.change} | 餘額: ${balance}</div>
                `;
                list.prepend(item);
            });
            totalDisplay.innerText = '$ ' + balance.toLocaleString();
            localStorage.setItem('stock_records', JSON.stringify(records));
        }

        function addRecord() {
            const type = document.getElementById('type').value;
            const symbol = document.getElementById('symbol').value;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const qty = parseInt(document.getElementById('qty').value) || 0;
            let change = parseFloat(document.getElementById('amount').value) || 0;

            if (type === 'buy') change = -(price * qty);
            else if (type === 'sell') change = (price * qty);
            else if (type === 'out') change = -Math.abs(change);

            records.push({
                date: new Date().toLocaleDateString(),
                type, symbol, change
            });
            updateUI();
        }
        updateUI();
    </script>
</body>
</html>
