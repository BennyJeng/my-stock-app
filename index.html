<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>股票交易日誌</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 關鍵修正：確保 iOS 下輸入框可以被選取並彈出鍵盤 */
        input, select, textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
            appearance: none;
            -webkit-appearance: none;
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        .record-card { transition: transform 0.1s; }
        .record-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">
    <div id="app" class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
            <span class="mr-2">📈</span> 投資交易日誌
        </h1>
        
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-6 rounded-2xl mb-6 shadow-xl">
            <p class="text-sm opacity-80 font-medium">當前帳戶預估結餘</p>
            <h2 id="totalBalance" class="text-3xl font-bold mt-1">$ 0</h2>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div class="col-span-1">
                    <label class="text-xs text-gray-500 ml-1">交易日期</label>
                    <input type="date" id="date" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="col-span-1">
                    <label class="text-xs text-gray-500 ml-1">類型</label>
                    <select id="type" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="toggleFields()">
                        <option value="buy">買入股票</option>
                        <option value="sell">賣出股票</option>
                        <option value="in">存入現金</option>
                        <option value="out">提出現金</option>
                    </select>
                </div>
            </div>

            <input type="text" id="symbol" placeholder="標的代碼 (如: 2330)" class="w-full mb-3 p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <div id="stockFields" class="grid grid-cols-2 gap-2 mb-3">
                <input type="number" step="any" id="price" placeholder="成交單價" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="qty" placeholder="股數" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div id="cashField" class="hidden mb-3">
                <input type="number" step="any" id="amount" placeholder="金額" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button onclick="addRecord()" class="w-full bg-blue-600 active:bg-blue-800 text-white py-3 rounded-xl font-bold shadow-md">
                儲存交易
            </button>
        </div>

        <div id="recordList" class="space-y-3"></div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();
        let records = JSON.parse(localStorage.getItem('my_trading_v3') || '[]');

        function toggleFields() {
            const type = document.getElementById('type').value;
            const isStock = type.includes('buy') || type.includes('sell');
            document.getElementById('stockFields').style.display = isStock ? 'grid' : 'none';
            document.getElementById('cashField').style.display = isStock ? 'none' : 'block';
        }

        function updateUI() {
            const list = document.getElementById('recordList');
            const totalDisplay = document.getElementById('totalBalance');
            list.innerHTML = '';
            
            records.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            let currentBalance = 0;
            const calcRecords = [...records].sort((a, b) => new Date(a.date) - new Date(b.date));
            calcRecords.forEach(r => currentBalance += r.change);

            records.forEach((r, index) => {
                const card = document.createElement('div');
                card.className = "record-card bg-white p-4 rounded-2xl shadow-sm border-l-4 flex justify-between items-center " + 
                                (r.change >= 0 ? 'border-green-500' : 'border-red-500');
                
                const typeText = { 'buy': '買入', 'sell': '賣出', 'in': '入金', 'out': '出金' }[r.type];
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="text-xs font-bold ${r.change >= 0 ? 'text-green-600' : 'text-red-600'}">${typeText} ${r.symbol || ''}</div>
                        <div class="text-xs text-gray-400">${r.date}</div>
                        <div class="text-sm font-bold mt-1">${r.change.toLocaleString()}</div>
                    </div>
                    <button onclick="deleteRecord(${index})" class="p-2 text-gray-300">🗑️</button>
                `;
                list.appendChild(card);
            });
            totalDisplay.innerText = '$ ' + currentBalance.toLocaleString();
            localStorage.setItem('my_trading_v3', JSON.stringify(records));
        }

        function addRecord() {
            const date = document.getElementById('date').value;
            const type = document.getElementById('type').value;
            const symbol = document.getElementById('symbol').value;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const qty = parseInt(document.getElementById('qty').value) || 0;
            let change = parseFloat(document.getElementById('amount').value) || 0;

            if (type === 'buy') change = -(price * qty);
            else if (type === 'sell') change = (price * qty);
            else if (type === 'out') change = -Math.abs(change);

            records.push({ date, type, symbol, price, qty, change });
            updateUI();
            
            // 重設輸入框
            document.getElementById('symbol').value = '';
            document.getElementById('price').value = '';
            document.getElementById('qty').value = '';
            document.getElementById('amount').value = '';
        }

        function deleteRecord(index) {
            if (confirm('確定刪除？')) {
                records.splice(index, 1);
                updateUI();
            }
        }
        updateUI();
        toggleFields();
    </script>
</body>
</html>
