<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>股票帳本</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input, select { font-size: 16px !important; -webkit-user-select: text !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-100 p-4 min-h-screen">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6 pt-4">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">📈 交易精算日誌</h1>
            <button onclick="openModal()" class="bg-indigo-600 text-white w-12 h-12 rounded-full shadow-lg text-3xl font-light">+</button>
        </div>
        
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-gray-200">
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">帳戶總可用餘額</p>
            <h2 id="totalBalance" class="text-3xl font-black text-gray-800">$ 0</h2>
        </div>

        <div id="recordList" class="space-y-3">
            </div>
    </div>

    <div id="inputModal" class="modal p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h3 class="font-bold mb-5 text-xl text-center text-gray-800">新增交易項目</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 ml-1">日期</label>
                    <input type="date" id="date" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100">
                </div>
                
                <select id="type" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 font-medium" onchange="toggleFields()">
                    <option value="buy">買入股票 (支出)</option>
                    <option value="sell">賣出股票 (收入)</option>
                    <option value="in">存入現金 (增加)</option>
                    <option value="out">提出現金 (減少)</option>
                </select>

                <input type="text" id="symbol" placeholder="標的代碼 / 項目說明" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-gray-400 ml-1">總變動金額 (含手續費)</label>
                        <input type="number" id="amount" placeholder="例如: 50035" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 font-bold text-blue-600">
                    </div>
                    <div id="qtyField">
                        <label class="text-xs text-gray-400 ml-1">成交股數</label>
                        <input type="number" id="qty" placeholder="例如: 1000" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100">
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-500">取消</button>
                    <button onclick="addRecord()" class="flex-1 bg-indigo-600 py-4 rounded-2xl font-bold text-white shadow-lg">確認儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();
        // 使用新的儲存 key 以免跟舊資料混淆
        let records = JSON.parse(localStorage.getItem('trading_v_final') || '[]');

        function openModal() {
            document.getElementById('inputModal').classList.add('active');
            setTimeout(() => document.getElementById('amount').focus(), 300);
        }

        function closeModal() {
            document.getElementById('inputModal').classList.remove('active');
        }

        function toggleFields() {
            const type = document.getElementById('type').value;
            const isStock = type === 'buy' || type === 'sell';
            document.getElementById('qtyField').style.opacity = isStock ? '1' : '0.3';
            document.getElementById('qty').disabled = !isStock;
        }

        function updateUI() {
            const list = document.getElementById('recordList');
            let balance = 0;
            list.innerHTML = '';
            
            // 依日期排序
            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            records.forEach(r => balance += r.change);
            
            [...records].reverse().forEach((r, i) => {
                const item = document.createElement('div');
                item.className = `bg-white p-5 rounded-2xl shadow-sm border-l-8 ${r.change >= 0 ? 'border-emerald-400' : 'border-rose-400'} flex justify-between items-center transition-all active:scale-95`;
                
                const typeName = { 'buy': '買入', 'sell': '賣出', 'in': '存入', 'out': '提出' }[r.type];
                
                item.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded-md ${r.change >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${typeName}</span>
                            <span class="font-bold text-gray-700">${r.symbol || '一般往來'}</span>
                        </div>
                        <div class="text-[10px] text-gray-400 font-medium">${r.date} ${r.qty ? `| 持股變動: ${r.qty} 股` : ''}</div>
                        <div class="text-lg font-black mt-1 ${r.change >= 0 ? 'text-emerald-500' : 'text-rose-500'}">
                            ${r.change >= 0 ? '+' : ''}${r.change.toLocaleString()}
                        </div>
                    </div>
                    <button onclick="deleteRecord(${records.length - 1 - i})" class="text-gray-200 hover:text-rose-300 p-2 text-2xl">×</button>
                `;
                list.appendChild(item);
            });
            document.getElementById('totalBalance').innerText = '$ ' + balance.toLocaleString();
            localStorage.setItem('trading_v_final', JSON.stringify(records));
        }

        function addRecord() {
            const type = document.getElementById('type').value;
            const symbol = document.getElementById('symbol').value;
            const qty = parseInt(document.getElementById('qty').value) || 0;
            let amt = parseFloat(document.getElementById('amount').value) || 0;
            
            // 重要邏輯：判定正負號
            // 買入與提出 = 帳戶錢變少 (負)
            // 賣出與存入 = 帳戶錢變多 (正)
            let change = (type === 'buy' || type === 'out') ? -Math.abs(amt) : Math.abs(amt);

            if (!amt && amt !== 0) { alert('請輸入金額'); return; }

            records.push({ 
                date: document.getElementById('date').value, 
                type, 
                symbol, 
                qty: (type === 'buy' || type === 'sell') ? qty : null,
                change 
            });
            
            updateUI();
            closeModal();
            // 清空
            ['symbol', 'qty', 'amount'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteRecord(index) {
            if(confirm('確定刪除此筆交易？餘額將重新計算。')) {
                records.splice(index, 1);
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
